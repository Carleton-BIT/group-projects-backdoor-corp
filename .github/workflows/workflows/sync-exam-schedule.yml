name: Sync exam schedule

on:
  schedule:
    - cron: "17 10 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-exam-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Sync examSchedule.json
        run: node scripts/syncExamSchedule.mjs

      - name: Commit changes
        run: |
          if git diff --quiet -- src/examSchedule.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/examSchedule.json
          git commit -m "Sync exam schedule JSON"
          git push