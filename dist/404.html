<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>StudentHub Redirect</title>
    <script>
      (function () {
        var pathname = window.location.pathname
        var search = window.location.search || ''
        var hash = window.location.hash || ''
        var repoBase = '/group-projects-backdoor-corp'
        var appPath = pathname.indexOf(repoBase) === 0
          ? pathname.slice(repoBase.length)
          : pathname

        sessionStorage.setItem('spa-redirect', repoBase + (appPath || '/') + search)
        window.location.replace(repoBase + '/' + hash)
      })()
    </script>
  </head>
  <body></body>
</html>
